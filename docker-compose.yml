version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: asset-db-v2
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: asset_db
    ports:
      - "3308:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend:
    build: ./backend
    container_name: asset-backend-v2
    ports:
      - "8082:8080"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: asset-frontend-v2
    ports:
      - "3002:3000"
    depends_on:
      - backend
